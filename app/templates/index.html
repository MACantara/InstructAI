{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h1 class="text-center mb-4 text-primary">Syllabus Generator</h1>
            <div class="card shadow-sm">
                <div class="card-body">
                    <form id="syllabusForm" onsubmit="return false;">
                        <div class="mb-3">
                            <label for="topic" class="form-label">Enter Course Topic</label>
                            <textarea id="topic" name="topic" class="form-control" rows="3"
                                placeholder="e.g., Introduction to Machine Learning, Web Development 101, etc." 
                                required></textarea>
                        </div>
                        <button type="submit" id="generate" class="btn btn-primary w-100">Generate Syllabus</button>
                    </form>
                </div>
            </div>
            
            <div id="response" class="mt-4"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/index.js') }}" type="module"></script>
{% endblock %}
