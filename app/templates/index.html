{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
{% endblock %}

{% block content %}
<div class="index-container">
    <h1 class="index-header">AI Assistant</h1>
    <div class="ai-interface">
        <textarea id="prompt" class="prompt-input" placeholder="Enter your question..."></textarea>
        <button id="generate" class="cta-button">Generate Response</button>
        <div id="response" class="response-area"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/index.js') }}"></script>
{% endblock %}
