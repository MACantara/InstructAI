{% extends "base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
{% endblock %}

{% block content %}
<div class="index-container">
    <h1 class="index-header">Syllabus Generator</h1>
    <div class="ai-interface">
        <form id="syllabusForm" onsubmit="return false;">
            <div class="input-group">
                <label for="topic">Enter Course Topic</label>
                <textarea id="topic" name="topic" class="prompt-input" 
                    placeholder="e.g., Introduction to Machine Learning, Web Development 101, etc." 
                    required></textarea>
            </div>
            <div class="options-group">
                <label>
                    <input type="checkbox" id="includeObjectives" checked>
                    Include Learning Objectives
                </label>
                <label>
                    <input type="checkbox" id="includeReadings" checked>
                    Include Recommended Readings
                </label>
            </div>
            <button type="submit" id="generate" class="cta-button">Generate Syllabus</button>
        </form>
        <div id="response" class="response-area"></div>
        <div id="bulk-actions" class="bulk-actions" style="display: none;">
            <button id="generateAllContent" class="secondary-button">
                <i class="fas fa-list-check"></i> Generate All Weekly Content
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/modules/renderer.js') }}" type="module"></script>
<script src="{{ url_for('static', filename='js/modules/weekContent.js') }}" type="module"></script>
<script src="{{ url_for('static', filename='js/modules/syllabus.js') }}" type="module"></script>
<script src="{{ url_for('static', filename='js/index.js') }}" type="module"></script>
{% endblock %}
